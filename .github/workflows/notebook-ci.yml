name: Notebook CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute CPU safe notebooks
        run: |
          jupyter nbconvert --to notebook --execute --inplace 00-what-is-finetuning/00-what-is-finetuning.ipynb
          jupyter nbconvert --to notebook --execute --inplace 01-choosing-a-base-model/01-choosing-a-base-model.ipynb
          jupyter nbconvert --to notebook --execute --inplace 02-dataset-preparation/02-dataset-preparation.ipynb
          jupyter nbconvert --to notebook --execute --inplace 03-lora-explained/03-lora-explained.ipynb

      # Notebook 04 and notebook 05 are skipped here because the intended training path needs
      # optional training dependencies and a GPU aware runtime.
